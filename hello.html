<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주목</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Nanum+Gothic:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fffb00;overflow:hidden;width:100vw;height:100vh;font-family:'Nanum Gothic','Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;position:relative}

/* 배경 삐뚤빼뚤 별 무늬 */
.bgstar{position:fixed;font-size:2em;opacity:.15;pointer-events:none;user-select:none}

#page1{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px;transition:opacity .5s}
#page1.hidden{opacity:0;pointer-events:none}
.paper{background:#fff;max-width:420px;width:100%;padding:36px 30px;border-radius:20px;box-shadow:0 20px 50px rgba(0,0,0,.15);position:relative}
.label{display:inline-block;color:#ff2d55;font-family:'Nanum Gothic',sans-serif;font-size:.85em;letter-spacing:1px;margin-bottom:10px}
.paper h2{font-family:'Nanum Gothic',sans-serif;color:#111;font-size:1.6em;margin-bottom:6px;line-height:1.3}
.paper .sub{color:#888;font-size:.8em;margin-bottom:20px;font-family:'Nanum Gothic',sans-serif}
.paper p{color:#222;line-height:1.7;font-size:1.05em;margin-bottom:12px;font-weight:700}
.paper .field{border:none;border-radius:12px;padding:12px 14px;margin-bottom:16px;color:#333;font-size:.95em;background:#f7f5ef;font-weight:700}
.btn-row{display:flex;gap:14px;margin-top:26px;position:relative;height:64px}
.btn{padding:14px 26px;font-size:1.1em;border:none;border-radius:12px;cursor:pointer;font-weight:900;font-family:'Nanum Gothic',sans-serif;transition:transform .15s;box-shadow:0 6px 16px rgba(0,0,0,.15)}
.btn:active{transform:scale(.96)}
.btn-agree{background:#ff2d55;color:#fff;position:absolute;left:0;top:0}
.btn-refuse{background:#f1f1f4;color:#333;position:absolute;right:0;top:0}
.hint{color:#555;font-size:.85em;margin-top:14px;text-align:center;font-weight:700}

#page2{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:50}
#page2.show{display:block}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}

.emoji{position:fixed;font-size:2em;pointer-events:none;z-index:60;user-select:none}

#msgBox{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:200;background:#000}
#msgBox.show{display:flex}
.msg{color:#fff;font-size:2em;text-align:center;line-height:1.6;animation:msgIn .6s cubic-bezier(.34,1.56,.64,1);padding:0 20px;font-family:'Nanum Gothic',sans-serif;font-weight:800}
.msg small{display:block;font-size:.45em;color:#999;margin-top:18px;font-weight:500}
@keyframes msgIn{from{opacity:0;transform:scale(.5) rotate(-8deg)}to{opacity:1;transform:scale(1) rotate(0)}}
</style>
</head>
<body>

<div id="page1">
  <div class="paper">
    <div class="label">⚠ 경고장</div>
    <h2>불만 신청서 접수됨.hwp</h2>
    <div class="sub">접수번호: 07-01-재수없음 · 담당자: 밍교</div>
    <p>최근 3개월간 당신의 답장 패턴을 분석한 결과, <br>진정성 47% 미달로 친구비 납부 대상에 선정되셨습니다.</p>
    <div class="field">신청인: <b>밍*</b> / 사유: <b>그냥 재수없어서</b></div>
    <p>※ "인정" 누르면 5초 내로 단톡방에서 강퇴. </p>
    <div class="btn-row">
      <button class="btn btn-agree" id="agreeBtn">인정함</button>
      <button class="btn btn-refuse" id="refuseBtn">억울함</button>
    </div>
    <div class="hint">이의제기는 안 받습니다~</div>
  </div>
</div>

<div id="page2"><canvas id="cv"></canvas></div>

<div id="msgBox">
  <div class="msg" id="msgText"></div>
</div>

<script>
const agreeBtn = document.getElementById('agreeBtn');
const refuseBtn = document.getElementById('refuseBtn');
const btnRow = document.querySelector('.btn-row');
let dodges = 0;
const dodgeLines = ['나','여깄어','야르렁','야호','헤헤','못잡죠'];

function dodgeAgree(){
  const maxX = btnRow.clientWidth - agreeBtn.clientWidth;
  const ny = (Math.random()-0.5)*40;
  const nx = Math.random()*maxX;
  agreeBtn.style.left = nx+'px';
  agreeBtn.style.top = ny+'px';
  agreeBtn.textContent = dodges < dodgeLines.length ? dodgeLines[dodges] : '못잡지롱ㅋㅋ';
  dodges++;
  spawnEmoji(agreeBtn);
}
function spawnEmoji(el){
  const rect = el.getBoundingClientRect();
  const emojis = ['💀','😭','🤡','🏃','😹','👻'];
  const e = document.createElement('div');
  e.className='emoji';
  e.textContent = emojis[~~(Math.random()*emojis.length)];
  e.style.left = rect.left+'px';
  e.style.top = rect.top+'px';
  document.body.appendChild(e);
  let t=0;
  const fy = -40 - Math.random()*40;
  const anim = setInterval(()=>{
    t+=1;
    e.style.transform = `translateY(${t*fy/20}px) rotate(${t*10}deg)`;
    e.style.opacity = 1-t/20;
    if(t>=20){clearInterval(anim); e.remove();}
  },20);
}
agreeBtn.addEventListener('mouseenter', dodgeAgree);
agreeBtn.addEventListener('touchstart', (e)=>{e.preventDefault(); dodgeAgree();});
agreeBtn.addEventListener('click', (e)=>{e.preventDefault(); dodgeAgree();});

refuseBtn.addEventListener('click', ()=>{
  document.getElementById('page1').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('page2').classList.add('show');
    startConfetti();
    setTimeout(showMsg, 1400);
  }, 400);
});

function showMsg(){
  document.getElementById('msgText').innerHTML = '뭐가 억울해<br> <small>마라탕 먹고싶당</small>';
  document.getElementById('msgBox').classList.add('show');
}

/* 컨페티 - 이모지 버전 */
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;}
resize(); addEventListener('resize',resize);
const TAU=Math.PI*2;
const emojiSet=['🎉','🔥','😂','💥','⭐','🐸'];
class Piece{
  constructor(){
    this.x=Math.random()*W; this.y=-30-Math.random()*H*0.3;
    this.vx=(Math.random()-.5)*3; this.vy=2+Math.random()*3;
    this.sz=20+Math.random()*16; this.emoji=emojiSet[~~(Math.random()*emojiSet.length)];
    this.r=Math.random()*TAU; this.rs=(Math.random()-.5)*.2;
  }
  update(){this.x+=this.vx;this.y+=this.vy;this.vy+=0.03;this.r+=this.rs;}
  draw(){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.r);ctx.font=this.sz+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(this.emoji,0,0);ctx.restore();}
}
let pieces=[];
let running=false;
function startConfetti(){
  running=true;
  for(let i=0;i<90;i++) pieces.push(new Piece());
  requestAnimationFrame(loop);
}
function loop(){
  if(!running) return;
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
  pieces.forEach(p=>{p.update();p.draw();});
  pieces = pieces.filter(p=>p.y < H+40);
  if(Math.random()>0.95 && pieces.length<160) pieces.push(new Piece());
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
